<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GUARDIAN BROADCAST OS v8.8 BETA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00ffc8;
            --bg: #000;
            --panel: #06110f;
            --line: rgba(0,255,200,.18);
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; background: var(--bg); color: var(--cyan);
            font-family: 'Share Tech Mono', monospace; height: 100vh; width: 100vw;
            overflow: hidden;
        }
        a { color: inherit; text-decoration: none; }

        /* CRT Effect */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 100; opacity: 0.12;
        }

        .shell {
            position: relative; z-index: 10; height: 100%; width: 100%; max-width: 1480px; margin: 0 auto;
            background: #050505; display: flex; flex-direction: column; overflow: hidden;
        }

        .topbar {
            background: #0a0a0a; border-bottom: 1px solid var(--line);
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 14px; flex-shrink: 0;
        }
        .brand { display: flex; align-items: center; gap: 8px; }
        .dot { width: 10px; height: 10px; border-radius: 999px; background: #ff3b6b; box-shadow: 0 0 10px rgba(255,59,107,.85); animation: pulse 1.25s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
        .title { font-family: 'Orbitron', sans-serif; letter-spacing: .2em; text-transform: uppercase; font-size: 12px; }
        
        .wallet-btn {
            border: 1px solid rgba(0,255,200,.5); background: rgba(0,255,200,.06); color: var(--cyan);
            border-radius: 12px; padding: 6px 10px; cursor: pointer; font-size: 10px; transition: .18s ease;
        }

        .tabs {
            display: flex; border-bottom: 1px solid var(--line); background: #0b0b0b; flex-shrink: 0;
        }
        .tab {
            flex: 1; padding: 12px 4px; text-align: center; cursor: pointer; font-size: 10px;
            border-right: 1px solid rgba(0,255,200,.06); user-select: none; color: rgba(0,255,200,0.5);
        }
        .tab.active { color: var(--cyan); background: linear-gradient(180deg, rgba(0,255,200,.14), rgba(0,255,200,.03)); box-shadow: inset 0 -1px 0 var(--cyan); }

        .content { flex: 1; overflow-y: auto; padding: 14px; background: #000; position: relative; }
        .section { display: none; height: 100%; }
        .section.active { display: flex; flex-direction: column; }

        .panel {
            background: linear-gradient(180deg, rgba(7,18,17,.95), rgba(2,8,8,.95));
            border: 1px solid var(--line); border-radius: 16px; padding: 14px;
            margin-bottom: 14px;
        }

        /* NEW BUTTON STYLING */
        .btn-link {
            display: inline-block; padding: 10px 20px; margin-top: 10px;
            border: 1px solid var(--cyan); border-radius: 4px; color: var(--cyan);
            font-family: 'Share Tech Mono', monospace; font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            position: relative; transition: 0.3s;
            background: rgba(0,255,200,0.05);
            box-shadow: 0 0 10px rgba(0,255,200,0.2);
        }
        .btn-link::before { content: "[ "; }
        .btn-link::after { content: " ]"; }
        .btn-link:hover {
            background: var(--cyan); color: #000;
            box-shadow: 0 0 20px var(--cyan);
        }

        .social-links { display: flex; flex-direction: column; gap: 20px; align-items: center; justify-content: center; height: 100%; }
        .social-item { text-align: center; }
        .social-label { font-family: 'Orbitron', sans-serif; font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div class="brand">
                <div class="dot"></div>
                <div class="title">GGB OS v8.8</div>
            </div>
            <button class="wallet-btn">CONNECT</button>
        </header>

        <nav class="tabs">
            <div class="tab active" onclick="switchTab(0)">CONSOLE</div>
            <div class="tab" onclick="switchTab(4)">SOCIALS</div>
        </nav>

        <main class="content">
            <section id="section-0" class="section active">
                <div class="panel" style="text-align: center;">
                    <h2 style="font-family: Orbitron; font-size: 14px;">NEURAL RELAY ACTIVE</h2>
                    <p style="font-size: 11px; opacity: 0.6;">SYSTEM READY...</p>
                </div>
            </section>

            <section id="section-4" class="section">
                <div class="panel" style="flex: 1;">
                    <div class="social-links">
                        <div class="social-item">
                            <div class="social-label">X-SECURE TRANSMITTER</div>
                            <a href="https://x.com/thegrossbros" target="_blank" class="btn-link">OPEN</a>
                        </div>
                        <div class="social-item">
                            <div class="social-label">THE DEN DECRYPTED</div>
                            <a href="https://discord.gg/fcZYk7UcB" target="_blank" class="btn-link">JOIN</a>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function switchTab(index) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (index == 4 ? 1 : 0)));
            document.querySelectorAll('.section').forEach((s, i) => {
                s.classList.remove('active');
                if ((index == 0 && i == 0) || (index == 4 && i == 1)) s.classList.add('active');
            });
        }
    </script>
</body>
</html>
