<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>GUARDIAN BROADCAST OS v8.8 BETA</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap' rel='stylesheet'>
  <style>
    :root { --cyan: #00ffc8; --bg: #000; --panel: #06110f; --line: rgba(0,255,200,.18); }
    * { box-sizing: border-box; }
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: var(--cyan);
      font-family: 'Share Tech Mono', monospace; height: 100%; width: 100%;
      overflow: hidden; /* Lock viewport for OS feel */
    }
    a { color: inherit; }

    /* CRT Overlays */
    body::before {
      content: " ";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0.12;
    }
    .crt-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 101;
      opacity: 0.08;
    }

    .shell { 
      position: relative;
      z-index: 10;
      max-width: 1480px; height: 100vh; margin: 0 auto;
      border: 12px solid #1f1f1f; border-radius: 24px; overflow: hidden;
      background: #050505; box-shadow: 0 30px 70px -20px rgba(0,0,0,.95), 0 0 100px -20px var(--cyan);
      display: flex; flex-direction: column;
    }
    @media (max-width: 640px) {
      .shell { border-width: 0; border-radius: 0; }
    }
    .topbar {
      background: #0a0a0a; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 10px 18px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .dot { width: 14px; height: 14px; border-radius: 999px; background: #ff3b6b; box-shadow: 0 0 18px rgba(255,59,107,.85); animation: pulse 1.25s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .title { font-family: 'Orbitron', sans-serif; letter-spacing: .25em; text-transform: uppercase; font-size: clamp(12px, 1.5vw, 18px); }
    .subtitle { font-size: 10px; color: rgba(0,255,200,.55); margin-top: 1px; }
    .wallet-btn, .btn {
      border: 1px solid rgba(0,255,200,.5); background: rgba(0,255,200,.06); color: var(--cyan);
      border-radius: 12px; padding: 8px 14px; cursor: pointer; font: inherit; transition: .18s ease; font-size: 12px;
    }
    .wallet-btn:hover, .btn:hover { background: rgba(0,255,200,.12); border-color: var(--cyan); }
    
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 1px solid var(--line);
      background: #0b0b0b;
    }
    .tab {
      flex: 1 0 100px; padding: 12px 8px; text-align: center; cursor: pointer;
      border-right: 1px solid rgba(0,255,200,.06); user-select: none; transition: .18s ease; font-size: 11px;
    }
    .tab.active { color: var(--cyan); background: linear-gradient(180deg, rgba(0,255,200,.14), rgba(0,255,200,.03)); box-shadow: inset 0 -1px 0 rgba(0,255,200,.35); }
    
    .content { flex: 1; overflow: auto; padding: 12px; background: #000; display: flex; flex-direction: column; }
    .section { display: none; height: 100%; }
    .section.active { display: block; }
    
    .panel {
      background: linear-gradient(180deg, rgba(7,18,17,.95), rgba(2,8,8,.95));
      border: 1px solid var(--line); border-radius: 20px; padding: 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    /* Fusion Lab Grid - Integrated layout */
    .fuse-panel {
      display: grid; 
      grid-template-columns: 320px 1fr; 
      gap: 16px; 
      height: 100%;
      align-content: stretch;
    }
    @media (max-width: 900px) {
      .fuse-panel { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
    }

    .held-nft-panel {
      border: 2px solid rgba(0, 255, 200, 0.35); border-radius: 20px;
      background: rgba(0, 0, 0, 0.7); padding: 0;
      display: flex; flex-direction: column; align-items: center; overflow: hidden;
      box-shadow: 0 0 30px rgba(0, 255, 200, 0.1);
      position: relative; height: fit-content;
      animation: signal-pulse 4s infinite alternate;
    }
    @keyframes signal-pulse {
      from { box-shadow: 0 0 20px rgba(0, 255, 200, 0.1); }
      to { box-shadow: 0 0 40px rgba(0, 255, 200, 0.3); }
    }
    
    .held-nft-image-wrapper {
      width: 100%; aspect-ratio: 3/4; border: none;
      background: #000; overflow: hidden; display: flex;
    }
    .held-nft-image-wrapper img { 
      width: 100%; height: 100%; object-fit: cover; opacity: 0.95; 
      filter: contrast(1.1) brightness(1.1);
    }
    .held-nft-empty {
      aspect-ratio: 3/4; width: 100%; display: flex; align-items: center; justify-content: center;
      text-align: center; color: rgba(0,255,200,0.25);
      font-family: 'Orbitron', sans-serif; letter-spacing: 0.3em; text-transform: uppercase; font-size: 12px;
    }

    /* Chat Terminal - Condensed for Single Screen */
    .chat-container {
      display: flex; flex-direction: column; gap: 12px; height: 100%; min-height: 0;
    }
    .chat-log {
      flex: 1; overflow-y: auto; border: 1px solid rgba(0,255,200,.12); border-radius: 18px;
      background: rgba(0,0,0,.4); padding: 12px; display: flex; flex-direction: column; gap: 10px;
      min-height: 250px;
    }
    .chat-terminal-actions {
      display: grid; grid-template-columns: 1fr auto auto; gap: 8px; align-items: stretch;
    }
    @media (max-width: 480px) {
      .chat-terminal-actions { grid-template-columns: 1fr; }
      .chat-log { min-height: 200px; }
      .fuse-panel { gap: 10px; padding: 10px; }
      .held-nft-panel { margin-bottom: 0; }
    }

    .bubble.user { background: rgba(0,255,200,.12); padding: 10px; border-radius: 14px; font-size: 13px; }
    .bubble.system { background: rgba(124,58,237,.12); padding: 10px; border-radius: 14px; font-size: 13px; border-left: 2px solid var(--cyan); }
    
    input {
      padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(0,255,200,.22);
      background: rgba(0,0,0,.5); color: #f1fffd; font: inherit; outline: none; font-size: 14px;
    }

    /* Mobile Single Screen Fix */
    @media (max-width: 480px) {
      .content { padding: 8px; }
      .fuse-panel { height: calc(100vh - 180px); display: flex; flex-direction: column; }
      .held-nft-panel { width: 140px; position: absolute; top: 10px; right: 10px; z-index: 20; border-radius: 12px; }
      .chat-container { flex: 1; margin-top: 0; }
      .fuse-head { margin-right: 150px; }
    }

  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  
  <div id="qr-overlay" onclick="this.style.display='none'">
    <div class="qr-container">
      <img id="qr-image" src="" alt="Scan with Xaman">
    </div>
    <p style="margin-top: 20px; font-family: Orbitron;">SCAN WITH XAMAN TO SYNC</p>
    <button class="btn" style="margin-top: 10px;">CANCEL</button>
  </div>

  <div class='shell'>
    <header class='topbar'>
      <div class='brand'>
        <div class='dot'></div>
        <div>
          <div class='title'>GUARDIAN OS v8.8</div>
          <div class='subtitle'>Neural terminal interface</div>
        </div>
      </div>
      <button id='wallet-btn' class='wallet-btn' onclick="connectXaman()">CONNECT</button>
      <div id='xaman-status' class='status' style="font-size:10px; opacity:0.6;">DISCONNECTED</div>
    </header>

    <nav class='tabs'>
      <div class='tab active' onclick="switchTab(0)">CONSOLE</div>
      <div class='tab' onclick="switchTab(1)">LORE</div>
      <div class='tab' onclick="switchTab(2)">FUSION</div>
      <div class='tab' onclick="switchTab(3)">RANK</div>
    </nav>

    <main class='content'>
      <section id='section-0' class='section active'>
        <div class='panel' style="height:100%; display:flex; flex-direction:column; justify-content:center; text-align:center;">
          <h1 id="status-msg" style='font-family:Orbitron; font-size:32px; margin:0;'>BRO OF THE DAY</h1>
          <div class='nft-art' style="width:200px; margin: 20px auto; aspect-ratio:3/4;">
             <img id='bro-of-day-image' src='' style="width:100%; height:100%; object-fit:cover; border-radius:12px;">
          </div>
          <p id='bro-of-day-description' style='font-size:13px; opacity:0.7; max-width:400px; margin: 0 auto;'>Synchronizing daily signal...</p>
        </div>
      </section>

      <section id='section-2' class='section'>
        <div class='panel fuse-panel'>
          <div id='held-nft-display' class='held-nft-panel'>
            <div id="connected-nft-display" style="display:none; width:100%;">
               <div class="held-nft-image-wrapper"><img id="connected-nft-image" src="" alt=""></div>
            </div>
            <div id="held-nft-empty" class="held-nft-empty">NO OPERATIVE</div>
          </div>

          <div class='chat-container'>
            <div class='fuse-head' style="display:flex; justify-content:space-between; align-items:center;">
              <div class='muted' style='font-size:10px; letter-spacing:2px;'>NEURAL TERMINAL</div>
              <div id='fuse-lock-badge' style="font-size:9px; border:1px solid #ff3b6b; padding:2px 6px; border-radius:4px; color:#ff3b6b;">LOCKED</div>
            </div>
            <div id='chat-log' class='chat-log'></div>
            <div class='chat-terminal-actions'>
              <input id='chat-input' placeholder='Send directive...'>
              <button id='chat-send-btn' class='btn' onclick="startChatStream()">SEND</button>
              <button id='fuse-button' class='btn' onclick="toggleFuseUnlock()">FUSE</button>
            </div>
          </div>
        </div>
      </section>
      <!-- Other sections simplified for brevity/layout focus -->
    </main>
  </div>

  <script>
    const CONFIG = {
      ISSUER: "rP1wMvanhfmsm7Af4FcHvSvfhash43LWSY",
      RPC: "https://xrplcluster.com",
      GATEWAY: "https://ipfs.io/ipfs/"
    };
    
    const state = { 
      connected: false, 
      wallet: "", 
      chat: [], 
      fuseUnlocked: false, 
      selectedNft: null, 
      userNfts: []
    };

    function xrplUriToHttp(uri) {
      if (!uri) return '';
      let value = uri;
      if (/^[0-9a-fA-F]+$/.test(uri)) {
        const bytes = new Uint8Array(uri.length / 2);
        for (let i = 0; i < uri.length; i += 2) {
          bytes[i / 2] = parseInt(uri.slice(i, i + 2), 16);
        }
        value = new TextDecoder().decode(bytes);
      }
      if (value.startsWith('ipfs://')) return CONFIG.GATEWAY + value.slice(7).replace(/^\/+/, '');
      return value;
    }

    async function loadBroOfDay() {
      try {
        const response = await fetch(`/api/nft?issuer=${CONFIG.ISSUER}`);
        const data = await response.json();
        const nfts = (data.result?.account_nfts || []).filter(nft => nft.NFTokenTaxon === 1);
        if (nfts.length === 0) return;
        const selected = nfts[Math.floor(Math.random() * nfts.length)];
        const meta = await (await fetch(xrplUriToHttp(selected.URI))).json();
        document.getElementById("bro-of-day-image").src = xrplUriToHttp(meta.image);
        document.getElementById("bro-of-day-description").textContent = meta.name;
      } catch (e) {}
    }

    async function connectXaman() {
      const btn = document.getElementById('wallet-btn');
      btn.textContent = '...';
      try {
        const res = await fetch('/api/xaman?action=create-payload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ txjson: { TransactionType: 'SignIn' } })
        });
        const payload = await res.json();
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile && payload?.refs?.qr_png) {
          document.getElementById('qr-image').src = payload.refs.qr_png;
          document.getElementById('qr-overlay').style.display = 'flex';
        }
        if (isMobile && payload?.next?.app_deep_link) window.open(payload.next.app_deep_link, '_blank');
        
        const timer = setInterval(async () => {
          const check = await fetch('/api/xaman?action=check-payload&uuid=' + payload.uuid);
          const status = await check.json();
          if (status.signed) {
            clearInterval(timer);
            document.getElementById('qr-overlay').style.display = 'none';
            const address = status.account || status.response?.account;
            state.connected = true;
            state.wallet = address;
            document.getElementById('wallet-btn').textContent = 'LINKED';
            document.getElementById('xaman-status').textContent = address.slice(0,6)+'...';
            fetchUserNfts(address);
          }
        }, 2500);
      } catch (e) { btn.textContent = 'CONNECT'; }
    }

    async function fetchUserNfts(address) {
      try {
        const res = await fetch(CONFIG.RPC, {
          method: 'POST',
          body: JSON.stringify({ method: "account_nfts", params: [{ account: address }] })
        });
        const data = await res.json();
        const filtered = (data.result?.account_nfts || []).filter(n => n.Issuer === CONFIG.ISSUER);
        if (filtered.length > 0) {
          const meta = await (await fetch(xrplUriToHttp(filtered[0].URI))).json();
          state.selectedNft = { name: meta.name, image: xrplUriToHttp(meta.image) };
          document.getElementById('held-nft-empty').style.display = 'none';
          document.getElementById('connected-nft-display').style.display = 'block';
          document.getElementById('connected-nft-image').src = state.selectedNft.image;
        }
      } catch (e) {}
    }

    function toggleFuseUnlock() {
      state.fuseUnlocked = !state.fuseUnlocked;
      const b = document.getElementById('fuse-lock-badge');
      b.textContent = state.fuseUnlocked ? 'UNLOCKED' : 'LOCKED';
      b.style.color = state.fuseUnlocked ? 'var(--cyan)' : '#ff3b6b';
      b.style.borderColor = state.fuseUnlocked ? 'var(--cyan)' : '#ff3b6b';
    }

    async function startChatStream() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      state.chat.push({ role: 'user', content: text });
      renderChatLog();
      const log = document.getElementById('chat-log');
      const bubble = document.createElement('div');
      bubble.className = 'bubble system';
      bubble.innerHTML = '<div class="msg-content">...</div>';
      log.appendChild(bubble);
      const contentEl = bubble.querySelector('.msg-content');

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: state.chat, operative: { walletAddress: state.wallet, traits: state.selectedNft ? [state.selectedNft.name] : [] } })
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const lines = decoder.decode(value).split('\n');
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') break;
              try { const json = JSON.parse(data); if (json.token) { full += json.token; contentEl.textContent = full; log.scrollTop = log.scrollHeight; } } catch (e) {}
            }
          }
        }
        state.chat.push({ role: 'assistant', content: full });
      } catch (e) { contentEl.textContent = 'SIGNAL LOST'; }
    }

    function renderChatLog() {
      const log = document.getElementById('chat-log');
      log.innerHTML = state.chat.map(e => `<div class="bubble ${e.role}">${e.content}</div>`).join('');
      log.scrollTop = log.scrollHeight;
    }

    function switchTab(index) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === index));
      document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === index));
    }

    window.onload = () => { loadBroOfDay(); };
  </script>
</body>
</html>
