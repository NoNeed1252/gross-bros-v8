name: Sync to IONOS VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Sync
        uses: appleboy/ssh-action@master
        with:
          host: 216.250.127.169
          username: root
          password: vAUL03juyPr1hu
          script: |
            echo "Starting sync process..."
            # Try to find the directory if the default doesn't exist
            if [ -d "/root/gross-bros-v8" ]; then
              cd /root/gross-bros-v8
            elif [ -d "gross-bros-v8" ]; then
              cd gross-bros-v8
            else
              echo "Error: Directory gross-bros-v8 not found in /root or home."
              ls -la
              exit 1
            fi
            
            echo "Pulling latest code..."
            git fetch origin main || exit 1
            git reset --hard origin/main || exit 1
            
            echo "Installing dependencies..."
            npm install || exit 1
            
            echo "Restarting application..."
            # Use --update-env to pick up potential config changes
            if pm2 list | grep -q "gross-bros-v7"; then
              echo "Restarting existing process..."
              pm2 restart gross-bros-v7 --update-env || exit 1
            elif [ -f "ecosystem.config.js" ]; then
              echo "Starting from ecosystem config..."
              pm2 start ecosystem.config.js || exit 1
            else
              echo "Starting server.js directly..."
              pm2 start server.js --name "gross-bros-v7" || exit 1
            fi
            
            echo "Saving PM2 state..."
            pm2 save || exit 1
            echo "Sync complete."
