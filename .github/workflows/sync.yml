name: Sync to IONOS VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Sync
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "Starting sync process..."
            if [ -d "/root/gross-bros-v8" ]; then
              cd /root/gross-bros-v8
            elif [ -d "gross-bros-v8" ]; then
              cd gross-bros-v8
            else
              echo "Error: Directory gross-bros-v8 not found."
              exit 1
            fi
            
            echo "Pulling latest code..."
            git fetch origin main || exit 1
            git reset --hard origin/main || exit 1
            
            echo "Syncing index.html to public/index.html..."
            cp index.html public/index.html
            
            echo "Installing dependencies..."
            npm install || exit 1
            
            echo "Restarting application..."
            if pm2 list | grep -q "gross-bros-v8"; then
              echo "Restarting gross-bros-v8..."
              pm2 restart gross-bros-v8 --update-env || exit 1
            else
              echo "Starting gross-bros-v8..."
              pm2 start ecosystem.config.js || exit 1
            fi
            
            # Stop old process if running
            if pm2 list | grep -q "gross-bros-v7"; then
              echo "Stopping old gross-bros-v7..."
              pm2 stop gross-bros-v7 || true
              pm2 delete gross-bros-v7 || true
            fi
            
            echo "Saving PM2 state..."
            pm2 save || exit 1
            echo "Sync complete."
