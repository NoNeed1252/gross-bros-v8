<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>GUARDIAN BROADCAST OS v8.9.5 STABLE</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap' rel='stylesheet'>
  <style>
    :root { --cyan: #00ffc8; --bg: #000; --panel: #06110f; --line: rgba(0,255,200,.18); }
    * { box-sizing: border-box; }
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: var(--cyan);
      font-family: 'Share Tech Mono', monospace; height: 100%; width: 100%;
    }
    a { color: inherit; }
    body::before {
      content: " ";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0.12;
    }
    .crt-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 101;
      opacity: 0.08;
    }
    .shell { 
      position: relative;
      z-index: 10;
      max-width: 1480px; min-height: calc(100vh - 24px); margin: 12px auto;
      border: 24px solid #1f1f1f; border-radius: 24px; overflow: hidden;
      background: #050505; box-shadow: 0 30px 70px -20px rgba(0,0,0,.95), 0 0 100px -20px var(--cyan);
      display: flex; flex-direction: column;
    }
    @media (max-width: 640px) {
      .shell { margin: 8px auto; min-height: calc(100vh - 16px); border-width: 0; }
    }
    .topbar {
      background: #0a0a0a; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 14px 18px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .dot { width: 14px; height: 14px; border-radius: 999px; background: #ff3b6b; box-shadow: 0 0 18px rgba(255,59,107,.85); animation: pulse 1.25s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .title { font-family: 'Orbitron', sans-serif; letter-spacing: .35em; text-transform: uppercase; font-size: clamp(14px, 2vw, 22px); }
    .subtitle { font-size: 11px; color: rgba(0,255,200,.55); margin-top: 3px; }
    .wallet-btn, .btn {
      border: 1px solid rgba(0,255,200,.5); background: rgba(0,255,200,.06); color: var(--cyan);
      border-radius: 18px; padding: 12px 18px; cursor: pointer; font: inherit; transition: .18s ease;
    }
    .wallet-btn:hover, .btn:hover { background: rgba(0,255,200,.12); border-color: var(--cyan); }
    .status { font-size: 12px; color: rgba(0,255,200,.6); text-align: right; }
    .ticker {
      border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
      overflow: hidden; white-space: nowrap; background: linear-gradient(90deg, rgba(0,255,200,.08), rgba(0,255,200,.03));
    }
    .ticker-track {
      display: inline-flex; align-items: center; gap: 4rem; padding: .65rem 1rem;
      animation: ticker 25s linear infinite; will-change: transform;
    }
    .ticker-item { color: rgba(0,255,200,.9); font-size: 13px; white-space: nowrap; letter-spacing: 1px; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--line); background: #0b0b0b; }
    .tab {
      flex: 1 0 120px; padding: 16px 12px; text-align: center; cursor: pointer;
      border-right: 1px solid rgba(0,255,200,.06); user-select: none; transition: .18s ease;
    }
    .tab.active { color: var(--cyan); background: linear-gradient(180deg, rgba(0,255,200,.14), rgba(0,255,200,.03)); box-shadow: inset 0 -1px 0 rgba(0,255,200,.35); }
    .content { flex: 1; overflow: auto; padding: 18px; background: #000; }
    .section { display: none; }
    .section.active { display: block; }
    .panel {
      background: linear-gradient(180deg, rgba(7,18,17,.95), rgba(2,8,8,.95));
      border: 1px solid var(--line); border-radius: 24px; padding: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .nft-panel {
      position: relative; overflow: hidden;
      background: radial-gradient(circle at top left, rgba(0,255,200,.12), transparent 42%), radial-gradient(circle at bottom right, rgba(124,58,237,.12), transparent 38%), linear-gradient(180deg, rgba(7,18,17,.98), rgba(2,8,8,.98));
    }
    .nft-art {
      position: relative; width: min(100%, 560px); aspect-ratio: 3 / 4; border-radius: 22px; border: 1px solid rgba(0,255,200,.22);
      background: radial-gradient(circle at 30% 20%, rgba(0,255,200,.22), rgba(0,0,0,.88) 55%), rgba(0,0,0,.65); overflow: hidden; display: flex; align-items: center; justify-content: center;
    }
    .nft-art img { width: 100%; height: 100%; object-fit: cover; opacity: .95; }
    .chat-log { height: 360px; overflow: auto; border: 1px solid rgba(0,255,200,.12); border-radius: 22px; background: rgba(0,0,0,.3); padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .bubble.user { background: rgba(0,255,200,.12); padding: 12px; border-radius: 18px; }
    .bubble.system { background: rgba(124,58,237,.12); padding: 12px; border-radius: 18px; }
    #qr-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column;
    }
    .qr-container { background: #fff; padding: 20px; border-radius: 12px; border: 4px solid var(--cyan); }
    .qr-container img { max-width: 300px; display: block; }
</style>
</head>
<body>
  <div class="crt-overlay"></div>
  <div id="qr-overlay" onclick="this.style.display='none'">
    <div class="qr-container"><img id="qr-image" src="" alt="Scan with Xaman"></div>
    <p style="margin-top: 20px; font-family: Orbitron;">SCAN WITH XAMAN TO SYNC</p>
    <button class="btn" style="margin-top: 10px;">CANCEL</button>
  </div>
  <div class='shell'>
    <header class='topbar'>
      <div class='brand'><div class='dot'></div><div><div class='title'>GUARDIAN BROADCAST OS v8.9.5 STABLE</div><div class='subtitle'>Neural CRT relay // terminal interface</div></div></div>
      <button id='wallet-btn' class='wallet-btn' onclick="connectXaman()">CONNECT XAMAN</button>
      <div id='xaman-status' class='status'>Wallet disconnected.</div>
    </header>
    <div class='ticker'><div id='warning-ticker-track' class='ticker-track'></div></div>
    <nav class='tabs'>
      <div class='tab active' onclick="switchTab(0)">CONSOLE</div>
      <div class='tab' onclick="switchTab(2)">FUSION LAB</div>
    </nav>
    <main class='content'>
      <section id='section-0' class='section active'>
        <div class='grid grid-2'>
          <div class='panel'>
            <div class='muted' style='letter-spacing:.35em;text-transform:uppercase;font-size:11px;'>BRO OF THE DAY</div>
            <h1 id="status-msg" style='font-family:Orbitron,sans-serif;font-size:clamp(28px,5vw,62px);margin:10px 0 0;'>BRO OF THE DAY</h1>
            <div class='row'><button class='btn' onclick="window.open('https://xrp.cafe/collection/galactic-gross-bros', '_blank')">BUY A BRO</button></div>
          </div>
          <div class='panel nft-panel'>
            <div class='nft-art'><img id='bro-of-day-image' alt='Bro of the Day' src=''></div>
            <p id='bro-of-day-description' class='nft-subtitle' style='margin-top:14px; text-align:center;'>Live NFT lore is loading...</p>
            <div id='bro-of-day-status' class='muted' style='font-size:10px; text-align:center;'>Initializing...</div>
          </div>
        </div>
      </section>
      <section id='section-2' class='section'>
        <div class='panel'>
          <div id='chat-log' class='chat-log'></div>
          <div style='display:flex; gap:10px; margin-top:20px;'>
            <input id='chat-input' style='flex:1; padding:12px; border-radius:12px; background:#000; color:#fff; border:1px solid var(--cyan);' placeholder='Enter directive...'>
            <button class='btn' onclick="startChatStream()">SEND</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script>
    const CONFIG = { ISSUER: "rP1wMvanhfmsm7Af4FcHvSvfhash43LWSY", GATEWAY: "https://ipfs.io/ipfs/" };
    const state = { connected: false, wallet: "", chat: [], activePayloadUuid: null };
    let checkInterval = null;

    async function safeFetch(url) { try { const r = await fetch(url); return r.ok ? await r.json() : null; } catch(e) { return null; } }

    async function loadBroOfDay() {
      const res = await safeFetch(`/api/nft?issuer=${CONFIG.ISSUER}&taxon=1&list=nfts`);
      if (res && res.nfts.length) {
        const nft = res.nfts[Math.floor(Math.random() * res.nfts.length)];
        const meta = await safeFetch(CONFIG.GATEWAY + nft.uri);
        if (meta) {
          document.getElementById('bro-of-day-image').src = meta.image.replace('ipfs://', CONFIG.GATEWAY);
          document.getElementById('bro-of-day-description').textContent = meta.description;
          document.getElementById('bro-of-day-status').textContent = 'Signal synchronized.';
        }
      }
    }

    async function connectXaman() {
      const btn = document.getElementById('wallet-btn');
      if (state.connected) {
        state.connected = false; state.wallet = ""; localStorage.removeItem('ggb_wallet');
        btn.textContent = 'CONNECT XAMAN'; return;
      }
      btn.disabled = true; btn.textContent = 'CONNECTING...';
      const res = await fetch('/api/xaman?action=create-payload', { method: 'POST' });
      const payload = await res.json();
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (!isMobile) {
        document.getElementById('qr-image').src = payload.qrUrl;
        document.getElementById('qr-overlay').style.display = 'flex';
      }
      state.activePayloadUuid = payload.uuid;
      startPolling(payload.uuid);
      if (isMobile) window.location.href = payload.next.app_deep_link;
    }

    function startPolling(uuid) {
      if (checkInterval) clearInterval(checkInterval);
      checkInterval = setInterval(async () => {
        const r = await fetch('/api/xaman?action=check-payload&uuid=' + uuid);
        const s = await r.json();
        if (s.signed) {
          clearInterval(checkInterval); state.connected = true; state.wallet = s.address;
          localStorage.setItem('ggb_wallet', s.address);
          document.getElementById('wallet-btn').textContent = 'LINKED';
          document.getElementById('xaman-status').textContent = s.address.slice(0,6) + '...';
          document.getElementById('qr-overlay').style.display = 'none';
        }
      }, 2500);
    }

    async function startChatStream() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim(); if (!text) return;
      input.value = ''; state.chat.push({ role: 'user', content: text });
      renderChat();
      const res = await fetch('/api/chat', { method: 'POST', body: JSON.stringify({ messages: state.chat, wallet: state.wallet }) });
      const data = await res.json();
      state.chat.push({ role: 'assistant', content: data.reply });
      renderChat();
    }

    function renderChat() {
      document.getElementById('chat-log').innerHTML = state.chat.map(m => `<div class='bubble ${m.role}'>${m.content}</div>`).join('');
    }

    function switchTab(i) {
      document.querySelectorAll('.tab').forEach((t, x) => t.classList.toggle('active', x === i));
      document.querySelectorAll('.section').forEach((s, x) => s.classList.toggle('active', x === i));
    }

    window.onload = () => {
      loadBroOfDay();
      const saved = localStorage.getItem('ggb_wallet');
      if (saved) { state.connected = true; state.wallet = saved; document.getElementById('wallet-btn').textContent = 'LINKED'; }
    };
  </script>
</body>
</html>
