<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>GUARDIAN BROADCAST OS v8.9.5 STABLE</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap' rel='stylesheet'>
  <style>
    :root { --cyan: #00ffc8; --bg: #000; --panel: #06110f; --line: rgba(0,255,200,.18); }
    * { box-sizing: border-box; }
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: var(--cyan);
      font-family: 'Share Tech Mono', monospace; height: 100%; width: 100%;
    }
    a { color: inherit; }

    body::before {
      content: ' ';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0.12;
    }
    .crt-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 101;
      opacity: 0.08;
    }

    .shell { 
      position: relative;
      z-index: 10;
      max-width: 1480px; min-height: calc(100vh - 24px); margin: 12px auto;
      border: 24px solid #1f1f1f; border-radius: 24px; overflow: hidden;
      background: #050505; box-shadow: 0 30px 70px -20px rgba(0,0,0,.95), 0 0 100px -20px var(--cyan);
      display: flex; flex-direction: column;
    }
    @media (max-width: 1024px), (max-height: 600px) {
      .shell { margin: 0 auto; min-height: 100vh; border-width: 0; border-radius: 0; }
    }
    .topbar {
      background: #0a0a0a; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 14px 18px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .dot { width: 14px; height: 14px; border-radius: 999px; background: #ff3b6b; box-shadow: 0 0 18px rgba(255,59,107,.85); animation: pulse 1.25s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .title { font-family: 'Orbitron', sans-serif; letter-spacing: .35em; text-transform: uppercase; font-size: clamp(14px, 2vw, 22px); }
    .subtitle { font-size: 11px; color: rgba(0,255,200,.55); margin-top: 3px; }
    .wallet-btn, .btn {
      border: 1px solid rgba(0,255,200,.5); background: rgba(0,255,200,.06); color: var(--cyan);
      border-radius: 18px; padding: 12px 18px; cursor: pointer; font: inherit; transition: .18s ease;
    }
    .wallet-btn:hover, .btn:hover { background: rgba(0,255,200,.12); border-color: var(--cyan); }
    .status { font-size: 12px; color: rgba(0,255,200,.6); text-align: right; }
    .ticker {
      border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
      overflow: hidden; white-space: nowrap; background: linear-gradient(90deg, rgba(0,255,200,.08), rgba(0,255,200,.03));
      height: 34px; display: flex; align-items: center;
    }
    .ticker-track {
      display: inline-flex; align-items: center; gap: 4rem; padding: 0 1rem;
      animation: ticker 30s linear infinite; will-change: transform;
    }
    .ticker-item { color: rgba(0,255,200,.9); font-size: 13px; white-space: nowrap; letter-spacing: 1px; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .tabs {
      display: flex; overflow-x: auto; border-bottom: 1px solid var(--line);
      background: #0b0b0b;
    }
    .tab {
      flex: 1 0 120px; padding: 16px 12px; text-align: center; cursor: pointer;
      border-right: 1px solid rgba(0,255,200,.06); user-select: none; transition: .18s ease;
    }
    .tab.active { color: var(--cyan); background: linear-gradient(180deg, rgba(0,255,200,.14), rgba(0,255,200,.03)); box-shadow: inset 0 -1px 0 rgba(0,255,200,.35); }
    .content { flex: 1; overflow: auto; padding: 18px; background: #000; }
    .section { display: none; }
    .section.active { display: block; }
    .panel {
      background: linear-gradient(180deg, rgba(7,18,17,.95), rgba(2,8,8,.95));
      border: 1px solid var(--line); border-radius: 24px; padding: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .grid { display: grid; gap: 16px; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
    .nft-panel {
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(0,255,200,.12), transparent 42%),
        radial-gradient(circle at bottom right, rgba(124,58,237,.12), transparent 38%),
        linear-gradient(180deg, rgba(7,18,17,.98), rgba(2,8,8,.98));
    }
    .nft-display {
      position: relative;
      display: grid;
      gap: 18px;
      justify-items: center;
      max-width: 760px;
      margin: 0 auto; text-align: center;
    }
    .nft-art {
      position: relative;
      width: min(100%, 560px);
      aspect-ratio: 3 / 4;
      border-radius: 22px;
      border: 1px solid rgba(0,255,200,.22);
      background: radial-gradient(circle at 30% 20%, rgba(0,255,200,.22), rgba(0,0,0,.88) 55%), rgba(0,0,0,.65);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 0 42px rgba(0,255,200,.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nft-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: .95;
    }
    .nft-art::after {
      content: 'FUSION PORTAL LIVE';
      position: absolute;
      left: 16px; right: 16px; bottom: 14px;
      padding: 8px 10px; border-radius: 999px;
      border: 1px solid rgba(0,255,200,.2);
      background: rgba(0,0,0,0.6);
      color: rgba(0,255,200,.85);
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; letter-spacing: .28em; text-align: center;
    }
    .nft-meta {
      display: grid; gap: 12px; max-width: 62ch;
      align-content: start; justify-items: center;
    }
    .nft-subtitle { margin: 0; color: #ddfff9; opacity: .82; line-height: 1.9; text-align: center; }
    .buy-btn {
      display: inline-block; padding: 14px 28px; background: #000; color: #00ffc8;
      border: 2px solid #00ffc8; border-radius: 12px;
      font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
      text-transform: uppercase; text-decoration: none; letter-spacing: 1.5px;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px rgba(0, 255, 200, 0.35), inset 0 0 12px rgba(0, 255, 200, 0.05);
      cursor: pointer;
    }
    .buy-btn:hover {
      background: #00ffc8; color: #000;
      box-shadow: 0 0 20px rgba(0, 255, 200, 0.6), inset 0 0 20px rgba(0, 255, 200, 0.2);
    }
    .chat-log {
      height: 260px; overflow: auto; border: 1px solid rgba(0,255,200,.12); border-radius: 22px;
      background: rgba(0,0,0,.3); padding: 12px; display: flex; flex-direction: column; gap: 10px;
    }
    .chat-terminal { display: grid; gap: 12px; }
    
    .held-nft-panel {
      border: 2px solid rgba(0, 255, 200, 0.35); border-radius: 24px;
      background: rgba(0, 0, 0, 0.7); padding: 0; margin-bottom: 24px;
      display: flex; flex-direction: column; align-items: center; overflow: hidden;
      box-shadow: 0 0 50px rgba(0, 255, 200, 0.15);
      position: relative;
    }
    @media (max-width: 640px) {
      .held-nft-panel { border-radius: 0; border-left: none; border-right: none; }
    }
    .held-nft-image-wrapper {
      width: 100%; height: auto; aspect-ratio: 1/1; border: none;
      background: #000;
    }
    .held-nft-image-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
    
    .held-nft-empty {
      padding: 80px 20px; text-align: center; color: rgba(0,255,200,0.25);
      font-family: 'Orbitron', sans-serif; letter-spacing: 0.3em; text-transform: uppercase;
    }
    
    .chat-terminal-actions {
      display: grid; grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px; align-items: stretch; margin-top: 24px;
    }
    @media (max-width: 720px) {
      .chat-terminal-actions { grid-template-columns: 1fr; }
    }
    .fuse-button-box {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 18px; border: 1px solid rgba(0,255,200,.22); background: rgba(0,0,0,.35);
    }
    .fuse-price { display: grid; gap: 2px; }
    .fuse-price strong { font-family: 'Orbitron', sans-serif; color: #f1fffd; font-size: 14px; }
    .nft-selection-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(0,255,200,.12); }
    .nft-selection-track { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 6px; }
    .nft-select-card {
      flex: 0 0 200px; padding: 12px; border-radius: 18px;
      border: 1px solid rgba(0,255,200,.15); background: rgba(0,0,0,.35);
      color: inherit; cursor: pointer;
    }
    .nft-select-card.active { border-color: var(--cyan); }
    .nft-select-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }
    .bubble.user { background: rgba(0,255,200,.12); padding: 12px; border-radius: 18px; }
    .bubble.system { background: rgba(124,58,237,.12); padding: 12px; border-radius: 18px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    input, select {
      padding: 14px 16px; border-radius: 18px; border: 1px solid rgba(0,255,200,.22);
      background: rgba(0,0,0,.5); color: #f1fffd; font: inherit; outline: none;
    }
    .fuse-panel { display: grid; gap: 14px; background: linear-gradient(180deg, rgba(7,18,17,.98), rgba(2,8,8,.98)); }
    .fuse-head { display: flex; align-items: center; justify-content: space-between; }
    .fuse-badge { padding: 8px 12px; border-radius: 999px; border: 1px solid var(--cyan); font-size: 10px; }
    .fuse-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; }
    .fuse-readout {
      padding: 16px; border-radius: 18px; border: 1px solid rgba(0,255,200,.12);
      background: rgba(0,0,0,.35); display: grid;
    }
    .fuse-readout strong { font-family: 'Orbitron', sans-serif; font-size: 18px; color: #f1fffd; }
    .leaderboard { display: grid; gap: 10px; }
    .leader-row {
      display: grid; grid-template-columns: 72px 1.5fr 100px 120px 120px; gap: 10px; align-items: center;
      padding: 14px 16px; border-bottom: 1px solid rgba(0,255,200,.08);
    }
    .muted { color: rgba(0,255,200,.6); }

    .lore-box {
      max-height: 400px;
      overflow-y: auto;
      padding: 20px;
      border: 1px solid var(--cyan);
      border-radius: 12px;
      background: rgba(0, 255, 200, 0.03);
      margin-bottom: 24px;
      scrollbar-width: thin;
      scrollbar-color: var(--cyan) rgba(0, 0, 0, 0.5);
    }
    .lore-box::-webkit-scrollbar { width: 6px; }
    .lore-box::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); border-radius: 10px; }
    .lore-box::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 10px; box-shadow: 0 0 10px var(--cyan); }

    #qr-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 9999; display: none;
      align-items: center; justify-content: center; flex-direction: column;
    }
    .qr-container {
      background: #fff; padding: 20px; border-radius: 12px; border: 4px solid var(--cyan);
      box-shadow: 0 0 30px var(--cyan);
    }
    .qr-container img { max-width: 300px; display: block; }
  
.social-links { display: grid; gap: 16px; }
.social-card { 
display: flex; 
align-items: center; 
justify-content: space-between; 
padding: 20px; 
border: 1px solid rgba(0,255,200,0.2); 
border-radius: 20px; 
background: rgba(0,255,200,0.04); 
text-decoration: none; 
transition: all 0.2s ease;
}
.social-card:hover {
background: rgba(0,255,200,0.08);
border-color: var(--cyan);
box-shadow: 0 0 15px rgba(0,255,200,0.1);
}
.social-card .label { 
font-family: 'Orbitron', sans-serif; 
font-size: 14px; 
color: var(--cyan); 
margin-bottom: 6px; 
letter-spacing: 1px;
}
.social-card .desc { font-size: 12px; color: rgba(0,255,200,0.7); }

    .modal {
      display: none;
      position: fixed;
      z-index: 10000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.98);
      backdrop-filter: blur(15px);
      overflow-y: auto;
    }
    .modal-content {
      background-color: #050505;
      margin: 10vh auto;
      padding: 50px;
      border: 2px solid var(--cyan);
      box-shadow: 0 0 50px var(--cyan);
      width: 90%;
      max-width: 900px;
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      position: relative;
      line-height: 1.6;
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 30px;
      color: var(--cyan);
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
    }

    .wallet-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @media (max-width: 480px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
        padding: 12px;
        gap: 16px;
      }
      .wallet-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        width: 100%;
      }
      .wallet-btn {
        padding: 10px 4px;
        font-size: 11px;
        letter-spacing: 0;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        white-space: nowrap;
        min-width: 0;
        overflow: hidden;
      }
      .wallet-btn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
      }
      .status {
        text-align: center;
        margin-top: 4px;
      }
    }
</style>
</head>
