<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>GUARDIAN BROADCAST OS v8.9.5 STABLE</title>
  <link rel='preconnect' href='https://fonts.googleapis.com'>
  <link rel='preconnect' href='https://fonts.gstatic.com' crossorigin>
  <link href='https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap' rel='stylesheet'>
  <style>
    :root { --cyan: #00ffc8; --bg: #000; --panel: #06110f; --line: rgba(0,255,200,.18); }
    * { box-sizing: border-box; }
    html, body { 
      margin: 0; padding: 0; background: var(--bg); color: var(--cyan);
      font-family: 'Share Tech Mono', monospace; height: 100%; width: 100%;
      overflow: hidden; /* Prevent body scroll, use shell for scrolling */
    }
    a { color: inherit; }

    body::before {
      content: " ";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0.12;
    }
    .crt-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 101;
      opacity: 0.08;
    }

    .shell { 
      position: relative;
      z-index: 10;
      width: 100%; height: 100vh;
      background: #050505; 
      display: flex; flex-direction: column;
      border: 8px solid #1f1f1f; /* Thinner border for small screens */
    }
    .topbar {
      background: #0a0a0a; border-bottom: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 8px 12px; flex-shrink: 0;
    }
    .brand { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: #ff3b6b; box-shadow: 0 0 10px rgba(255,59,107,.85); animation: pulse 1.25s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .title { font-family: 'Orbitron', sans-serif; letter-spacing: .1em; text-transform: uppercase; font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .ticker {
      border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
      overflow: hidden; white-space: nowrap; background: rgba(0,255,200,.03); flex-shrink: 0;
    }
    .ticker-track {
      display: inline-flex; align-items: center; gap: 1rem; padding: 4px 10px;
      animation: ticker 20s linear infinite;
    }
    .ticker-item { color: rgba(0,255,200,.9); font-size: 10px; }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    .tabs {
      display: flex; overflow-x: auto; border-bottom: 1px solid var(--line);
      background: #0b0b0b; flex-shrink: 0;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex: 1 0 auto; padding: 10px 12px; text-align: center; cursor: pointer;
      border-right: 1px solid rgba(0,255,200,.06); font-size: 11px; white-space: nowrap;
    }
    .tab.active { color: var(--cyan); background: rgba(0,255,200,.1); box-shadow: inset 0 -1px 0 var(--cyan); }

    .content { flex: 1; overflow-y: auto; background: #000; position: relative; }
    .section { display: none; height: 100%; padding: 12px; }
    .section.active { display: block; }

    .panel {
      background: linear-gradient(180deg, rgba(7,18,17,.95), rgba(2,8,8,.95));
      border: 1px solid var(--line); border-radius: 12px; padding: 12px;
      margin-bottom: 12px;
    }

    /* Fusion Lab - Optimized for 320px */
    .fusion-layout {
      display: flex; flex-direction: column; gap: 8px; height: 100%;
    }
    .held-nft-small {
      width: 100%; display: flex; align-items: center; gap: 10px;
      padding: 8px; border: 1px solid var(--line); border-radius: 8px; background: rgba(0,0,0,0.5);
    }
    .nft-thumb { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; border: 1px solid var(--line); }
    .nft-name-small { font-family: 'Orbitron'; font-size: 12px; color: var(--cyan); }

    .chat-container-compact {
      flex: 1; display: flex; flex-direction: column; min-height: 200px;
      border: 1px solid var(--line); border-radius: 12px; background: rgba(0,0,0,0.3); overflow: hidden;
    }
    .chat-log {
      flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 8px;
    }
    .bubble { padding: 8px; border-radius: 8px; font-size: 12px; line-height: 1.4; max-width: 90%; }
    .bubble.user { align-self: flex-end; background: rgba(0,255,200,0.15); border: 1px solid rgba(0,255,200,0.3); }
    .bubble.system { align-self: flex-start; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); }

    .chat-input-area {
      padding: 8px; background: rgba(10,10,10,0.8); border-top: 1px solid var(--line);
      display: flex; gap: 6px;
    }
    .chat-input-area input {
      flex: 1; background: #000; border: 1px solid var(--line); color: #fff;
      padding: 6px 10px; border-radius: 6px; font-size: 12px; outline: none;
    }
    .chat-input-area button {
      background: var(--cyan); color: #000; border: none; padding: 6px 12px;
      border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer;
    }

    /* Storyline */
    .transmission-item {
      padding: 10px; border-bottom: 1px solid var(--line); margin-bottom: 8px;
    }
    .transmission-date { font-size: 9px; color: rgba(0, 255, 200, 0.5); margin-bottom: 4px; }
    .transmission-content { font-size: 13px; line-height: 1.5; color: #ddfff9; }

    @media (min-width: 641px) {
      .shell { border-width: 24px; border-radius: 24px; margin: 12px auto; max-width: 1480px; height: calc(100vh - 24px); }
      .fusion-layout { flex-direction: row; align-items: flex-start; }
      .held-nft-small { flex-direction: column; width: 240px; text-align: center; }
      .nft-thumb { width: 100%; height: auto; aspect-ratio: 1; }
      .title { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="crt-overlay"></div>
  
  <div id="qr-overlay" onclick="this.style.display='none'" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:none;align-items:center;justify-content:center;flex-direction:column;">
    <div style="background:#fff;padding:20px;border-radius:12px;border:4px solid var(--cyan);box-shadow:0 0 30px var(--cyan);"><img id="qr-image" src="" alt="Scan" style="max-width:250px;"></div>
    <p style="margin-top:20px;font-family:Orbitron;color:var(--cyan);font-size:14px;">SCAN WITH XAMAN</p>
  </div>

  <div class='shell'>
    <header class='topbar'>
      <div class='brand'>
        <div class='dot'></div>
        <div class='title'>GUARDIAN BROADCAST OS</div>
      </div>
      <button id='wallet-btn' class='btn' onclick="connectXaman()" style="font-size:10px;padding:6px 10px;">CONNECT</button>
    </header>

    <div class='ticker'>
      <div id='warning-ticker-track' class='ticker-track'></div>
    </div>

    <nav class='tabs'>
      <div class='tab active' onclick="switchTab(0)">CONSOLE</div>
      <div class='tab' onclick="switchTab(1)">STORYLINE</div>
      <div class='tab' onclick="switchTab(2)">FUSION LAB</div>
      <div class='tab' onclick="switchTab(3)">SOCIALS</div>
    </nav>

    <main class='content'>
      <!-- CONSOLE -->
      <section id='section-0' class='section active'>
        <div class='panel'>
          <div style='font-size:10px;opacity:0.6;letter-spacing:2px;'>BRO OF THE DAY</div>
          <h2 id="status-msg" style='font-family:Orbitron;font-size:18px;margin:8px 0;'>SYNCHRONIZING...</h2>
          <div style="width:100%; aspect-ratio:3/4; border:1px solid var(--line); border-radius:8px; overflow:hidden; margin-bottom:12px;">
            <img id='bro-of-day-image' src='' style="width:100%; height:100%; object-fit:cover;">
          </div>
          <p id='bro-of-day-description' style='font-size:12px; line-height:1.6; color:#ddfff9; opacity:0.8;'>Loading lore archive...</p>
        </div>
      </section>

      <!-- STORYLINE -->
      <section id='section-1' class='section'>
        <div class='panel'>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div style='font-size:10px;opacity:0.6;letter-spacing:2px;'>STORYLINE</div>
            <input type="date" id="lore-date-filter" onchange="loadTransmissions(this.value)" style="background:#000;border:1px solid var(--line);color:var(--cyan);font-size:10px;padding:4px;">
          </div>
          <div id="transmissions-container">
            <p style="font-size:12px;opacity:0.6;">Scanning frequencies...</p>
          </div>
        </div>
      </section>

      <!-- FUSION LAB -->
      <section id='section-2' class='section'>
        <div class="fusion-layout">
          <!-- NFT Side/Top -->
          <div id="held-nft-display" class="held-nft-small">
            <img id="connected-nft-image" src="https://ipfs.io/ipfs/QmZ8nyVf4XvK6mZqLpC3P1pXN3zYJ5GzW1R1vX7p6N3zYJ" class="nft-thumb">
            <div>
              <div class="nft-name-small" id="connected-nft-name">GUEST_USER</div>
              <div style="font-size:9px;opacity:0.5;margin-top:4px;">STATUS: ACTIVE</div>
            </div>
          </div>

          <!-- Chat -->
          <div class="chat-container-compact">
            <div id='chat-log' class='chat-log'>
              <div class="bubble system">TERMINAL ONLINE. WELCOME OPERATIVE.</div>
            </div>
            <div class='chat-input-area'>
              <input id='chat-input' placeholder='Command...'>
              <button onclick="startChatStream()">SEND</button>
            </div>
          </div>
        </div>
      </section>

      <!-- SOCIALS -->
      <section id='section-3' class='section'>
        <div class='panel'>
          <h2 style='font-family:Orbitron;font-size:16px;'>SOCIAL CHANNELS</h2>
          <div style="display:grid; gap:8px; margin-top:12px;">
            <a href='https://x.com/thegrossbros' target='_blank' style="text-decoration:none;">
              <div class="panel" style="margin:0; border-color:rgba(0,255,200,0.3); padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:12px;">X-TRANSMITTER</span>
                <span style="font-size:10px; color:var(--cyan);">OPEN</span>
              </div>
            </a>
            <a href='https://discord.gg/fcZYk7UcB' target='_blank' style="text-decoration:none;">
              <div class="panel" style="margin:0; border-color:rgba(0,255,200,0.3); padding:10px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:12px;">DISCORD DEN</span>
                <span style="font-size:10px; color:var(--cyan);">JOIN</span>
              </div>
            </a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const CONFIG = {
      ISSUER: "rP1wMvanhfmsm7Af4FcHvSvfhash43LWSY",
      GATEWAY: "https://ipfs.io/ipfs/"
    };
    
    const state = { connected: false, wallet: "", chat: [], selectedNft: null };

    function xrplUriToHttp(uri) {
      if (!uri) return '';
      let value = String(uri).trim();
      if (value.startsWith('ipfs://')) return CONFIG.GATEWAY + value.slice(7);
      return value;
    }

    async function loadBroOfDay() {
      try {
        const res = await fetch(`/api/nft?issuer=${CONFIG.ISSUER}&taxon=1&list=nfts`);
        const result = await res.json();
        const nfts = result?.nfts || [];
        if (nfts.length > 0) {
          const dailyIdx = Math.floor(Date.now() / 86400000) % nfts.length;
          const nft = nfts[dailyIdx];
          const meta = await (await fetch(xrplUriToHttp(nft.uri))).json();
          document.getElementById('bro-of-day-image').src = xrplUriToHttp(meta.image);
          document.getElementById('bro-of-day-description').textContent = meta.description || "No lore found in the archives.";
          document.getElementById('status-msg').textContent = meta.name || "BRO OF THE DAY";
        }
      } catch (e) { console.error(e); }
    }

    async function loadTransmissions(date = '') {
      const container = document.getElementById('transmissions-container');
      try {
        const url = date ? `/api/transmissions?date=${date}` : '/api/transmissions';
        const res = await fetch(url);
        const data = await res.json();
        if (data.transmissions?.length > 0) {
          container.innerHTML = data.transmissions.map(t => `
            <div class="transmission-item">
              <div class="transmission-date">${new Date(t.date_added).toLocaleString()}</div>
              <div class="transmission-content">${t.transmission_text}</div>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p style="font-size:12px;opacity:0.5;">No transmissions found on this frequency.</p>';
        }
      } catch (e) { container.innerHTML = '<p style="color:#ff3b6b;">Signal interference detected.</p>'; }
    }

    async function connectXaman() {
      const btn = document.getElementById('wallet-btn');
      btn.textContent = '...';
      try {
        const payload = await (await fetch('/api/xaman?action=create-payload', { method: 'POST' })).json();
        if (payload?.refs?.qr_png) {
          document.getElementById('qr-image').src = payload.refs.qr_png;
          document.getElementById('qr-overlay').style.display = 'flex';
        }
        // Poll status... (simplified for brevity)
      } catch (e) { btn.textContent = 'ERROR'; }
    }

    async function startChatStream() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      state.chat.push({ role: 'user', content: text });
      renderChat();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: state.chat })
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let assistantMsg = { role: 'assistant', content: '' };
        state.chat.push(assistantMsg);

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.token) {
                  assistantMsg.content += data.token;
                  renderChat();
                }
              } catch(e){}
            }
          }
        }
      } catch (e) { console.error(e); }
    }

    function renderChat() {
      const log = document.getElementById('chat-log');
      log.innerHTML = state.chat.map(m => `
        <div class="bubble ${m.role === 'user' ? 'user' : 'system'}">${m.content}</div>
      `).join('');
      log.scrollTop = log.scrollHeight;
    }

    function switchTab(idx) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
      document.querySelectorAll('.section').forEach((s, i) => s.classList.toggle('active', i === idx));
      if (idx === 1) loadTransmissions();
    }

    function init() {
      const ticker = document.getElementById('warning-ticker-track');
      const items = ['SIGNAL STABLE', 'NEURAL LINK ACTIVE', 'FUSION READY', 'ENCRYPTION ENABLED'];
      ticker.innerHTML = items.concat(items).map(i => `<span class="ticker-item">${i}</span>`).join(' • ');
      loadBroOfDay();
      setInterval(loadBroOfDay, 3600000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
